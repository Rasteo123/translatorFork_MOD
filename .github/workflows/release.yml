name: Release Builds

on:
  push:
    tags:
      - 'v*' # Trigger on tags like v1.0, v2.1.3
  workflow_dispatch: # Allow manual trigger

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
    
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: |
            requirements.txt

      - name: Install System Dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install portaudio

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Run PyInstaller
        run: pyinstaller translatorFork_MOD.spec

      - name: Package Windows
        if: matrix.os == 'windows-latest'
        run: |
          Compress-Archive -Path dist\translatorFork_MOD.exe -DestinationPath GeminiTranslator-Windows.zip

      - name: Package macOS
        if: matrix.os == 'macos-latest'
        run: |
          npm install -g create-dmg
          create-dmg dist/GeminiTranslator.app || true
          mv *.dmg GeminiTranslator-macOS.dmg || true
          # Fallback to ZIP if create-dmg fails (which can happen on some CI environments)
          if [ ! -f GeminiTranslator-macOS.dmg ]; then
            cd dist
            zip -r ../GeminiTranslator-macOS.zip GeminiTranslator.app
            cd ..
          fi

      - name: Upload Windows Artifact
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: GeminiTranslator-Windows
          path: GeminiTranslator-Windows.zip

      - name: Upload macOS Artifact (DMG)
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: GeminiTranslator-macOS-DMG
          path: GeminiTranslator-macOS.dmg
          if-no-files-found: ignore
          
      - name: Upload macOS Artifact (ZIP)
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: GeminiTranslator-macOS-ZIP
          path: GeminiTranslator-macOS.zip
          if-no-files-found: ignore

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          
      - name: Move artifacts to release dir
        run: |
          mkdir release_assets
          find artifacts -type f -name "*.zip" -exec mv {} release_assets/ \;
          find artifacts -type f -name "*.dmg" -exec mv {} release_assets/ \;

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: release_assets/*
          draft: false
          prerelease: false
          generate_release_notes: true
